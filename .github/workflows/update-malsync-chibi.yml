name: Update MALSync chibi data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

# Allow the workflow to push commits/PRs with the generated JSON
permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch MALSync chibi pages
        env:
          MALSYNC_ROOT: https://chibi.malsync.moe
          MALSYNC_TYPES: anime
        run: node scripts/fetch-malsync-chibi.mjs

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/update-malsync-chibi
          delete-branch: true
          commit-message: chore: refresh MALSync chibi data
          title: chore: refresh MALSync chibi data
          body: |
            Automated update of MALSync chibi pages (anime-only).
          add-paths: |
            src/lib/chibi/malsync-pages.json
          base: master
          labels: automation

name: Build extension

# Builds the extension for Chrome, Firefox, and Safari on every push to master.
# Each target's zip(s) are uploaded as a downloadable workflow artifact.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [chrome, firefox, safari]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and zip (${{ matrix.target }})
        run: bunx wxt zip -b ${{ matrix.target }}

      - name: Upload ${{ matrix.target }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-build
          path: .output/*.zip
          # The zips live in .output/, a dotfile dir. upload-artifact@v4 treats
          # anything under a hidden parent as hidden and skips it by default,
          # which makes the glob match nothing and fail with if-no-files-found.
          include-hidden-files: true
          if-no-files-found: error

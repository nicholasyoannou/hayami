name: Build extension

# Builds the extension for Chrome, Firefox, and Safari on every push to master.
# Each target's zip(s) are uploaded as a downloadable workflow artifact.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [chrome, firefox, safari]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and zip (${{ matrix.target }})
        run: npx wxt zip -b ${{ matrix.target }}

      - name: Upload ${{ matrix.target }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-build
          path: .output/*.zip
          if-no-files-found: error
